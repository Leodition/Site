<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORTEADOR | Leodition SHOW</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #FFB800; 
            --accent: #FF6B00;  
            --dark-bg: #0A0A0A;
            --card-bg: #141414;
            --text: #FFFFFF;
            --text-muted: #A0A0A0;
            --border: #2A2A2A;
            --slot-width: 250px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #222, var(--dark-bg));
            color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        /* Botões Laterais (Mantidos fixos) */
        .side-buttons { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-side {
            background: #1a1a1a; border: 1px solid var(--border); color: var(--text-muted);
            padding: 12px 18px; border-radius: 8px; text-decoration: none; font-size: 0.8rem;
            font-weight: 600; transition: 0.3s; text-transform: uppercase; text-align: center;
        }
        .btn-side:hover { border-color: var(--primary); color: var(--primary); transform: translateX(-5px); }

        .container {
            width: 100%; max-width: 950px; background: var(--card-bg);
            padding: 40px; border-radius: 24px; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

        /* Coluna Esquerda */
        .logo-site { width: 160px; margin-bottom: 20px; display: block; }
        h1 { font-size: 1.5rem; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; margin-bottom: 25px; }

        .menu-sorteio { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-mode {
            flex: 1; background: #1a1a1a; border: 1px solid var(--border);
            color: var(--text-muted); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .btn-mode.active { background: var(--primary); color: #000; border-color: var(--primary); }

        textarea {
            width: 100%; height: 120px; background: #080808; border: 1px solid var(--border);
            color: #fff; border-radius: 12px; padding: 15px; font-size: 0.9rem; resize: none; margin-bottom: 10px;
        }
        .input-tip { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 15px; }

        .input-controls { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-tool {
            flex: 1; background: #1a1a1a; border: 1px solid var(--border);
            color: var(--text-muted); padding: 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer;
        }

        .btn-draw {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; color: #000; padding: 20px; font-size: 1.2rem; font-weight: 900;
            border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase;
        }

        /* Coluna Direita (Display) */
        .display-area {
            background: #000; border: 4px solid var(--border); border-radius: 16px;
            height: 400px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Carretel */
        .reel-track {
            display: flex; position: absolute; left: 50%;
            transition: transform 1.5s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .slot {
            min-width: var(--slot-width); height: 100px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; color: var(--text-muted);
            border-right: 1px solid #111; padding: 0 10px; text-transform: uppercase;
        }
        .slot.win { color: var(--primary); text-shadow: 0 0 20px var(--primary); font-size: 2.2rem; }

        .pointer {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; z-index: 10; border-left: 20px solid transparent; border-right: 20px solid transparent;
        }
        .p-top { border-top: 30px solid var(--primary); top: 0; }
        .p-bottom { border-bottom: 30px solid var(--primary); bottom: 0; }

        /* Quadro de Grupos Interno */
        #group-result {
            width: 100%; height: 100%; padding: 20px; display: none;
            overflow-y: auto; flex-direction: column; gap: 10px;
        }
        .group-card { background: #0f0f0f; border-left: 4px solid var(--primary); padding: 12px; border-radius: 4px; }
        .group-card strong { color: var(--primary); font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="side-buttons">
        <a href="https://www.leodition.com.br" target="_blank" class="btn-side">Site Leodition</a>
        <a href="https://wa.me/5551998911304" target="_blank" class="btn-side" style="border-color: #25D366; color: #25D366;">Suporte Whats</a>
    </div>

    <div class="container">
        <!-- Coluna de Configuração -->
        <div class="config-col">
            <img src="assets/img/logo/leologo.png" alt="Logo Leodition" class="logo-site">
            <h1>Sorteador</h1>

            <div class="menu-sorteio">
                <button class="btn-mode active" id="btn-ind" onclick="setMode('individual')">Individual</button>
                <button class="btn-mode" id="btn-grp" onclick="setMode('grupo')">Grupos</button>
            </div>

            <textarea id="namesInput" placeholder="Nomes separados por vírgula..." oninput="updatePreview()"></textarea>
            <p class="input-tip">Dica voz: Diga o nome e use "BARRA" para separar (ex: Leo barra Maria).</p>

            <div class="input-controls">
                <button class="btn-tool" onclick="document.getElementById('fileIn').click()">📂 Foto ou Lista</button>
                <button class="btn-tool" id="voiceBtn" onclick="toggleVoice()">🎤 Voz</button>
            </div>
            <input type="file" id="fileIn" style="display:none" accept="image/*,.txt" onchange="handleFile(this)">

            <div id="grp-opt" style="display:none; margin-bottom:20px;">
                <select id="grpSize" style="width:100%; padding:12px; background:#1a1a1a; color:#fff; border:1px solid var(--border); border-radius:8px;">
                    <option value="2">Formar Duplas</option>
                    <option value="3">Formar Trios</option>
                    <option value="4">Formar Quartetos</option>
                </select>
            </div>

            <button class="btn-draw" id="mainBtn" onclick="execute()">Sortear Agora!</button>
            <div id="status-log" style="margin-top:10px; font-size:0.8rem; color:var(--primary);"></div>
        </div>

        <!-- Coluna de Visualização -->
        <div class="display-col">
            <div class="display-area">
                <div id="ind-view" style="width:100%; height:100%; position:relative; display:flex; align-items:center;">
                    <div class="pointer p-top"></div>
                    <div class="reel-track" id="track">
                        <div class="slot">Aguardando...</div>
                    </div>
                    <div class="pointer p-bottom"></div>
                </div>
                <div id="group-result"></div>
            </div>
        </div>
    </div>

    <script>
        let mode = 'individual';
        let pool = [];
        const track = document.getElementById('track');
        const namesInput = document.getElementById('namesInput');
        const grpResult = document.getElementById('group-result');

        function setMode(m) {
            mode = m;
            document.getElementById('btn-ind').classList.toggle('active', m === 'individual');
            document.getElementById('btn-grp').classList.toggle('active', m === 'grupo');
            document.getElementById('grp-opt').style.display = m === 'grupo' ? 'block' : 'none';
            document.getElementById('ind-view').style.display = m === 'individual' ? 'flex' : 'none';
            grpResult.style.display = m === 'grupo' ? 'flex' : 'none';
            if(m === 'individual') updatePreview();
        }

        async function handleFile(input) {
            const file = input.files[0]; if(!file) return;
            const log = document.getElementById('status-log');
            if(file.type.startsWith('image/')) {
                log.innerText = "⏳ Lendo caderno...";
                const res = await Tesseract.recognize(file, 'por');
                namesInput.value = res.data.text.split('\n').map(l => l.replace(/^[0-9.\-\s]+/, '').trim()).filter(l => l.length > 2).join(', ');
                log.innerText = "✅ Foto lida!";
            } else {
                const r = new FileReader();
                r.onload = e => { namesInput.value = e.target.result.replace(/[\r\n]+/g, ', '); log.innerText = "✅ Lista importada!"; };
                r.readAsText(file);
            }
            updatePreview();
        }

        let recognition;
        if('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.onresult = e => {
                let text = e.results[0][0].transcript.replace(/\s*barra\s*/gi, ', ');
                namesInput.value += (namesInput.value ? ', ' : '') + text;
                toggleVoice(); updatePreview();
            };
        }
        function toggleVoice() {
            const btn = document.getElementById('voiceBtn');
            if(btn.classList.contains('recording')) { recognition.stop(); btn.classList.remove('recording'); btn.style.background=""; }
            else { recognition.start(); btn.classList.add('recording'); btn.style.background="#ff4b4b"; }
        }

        function getNames() { return namesInput.value.split(',').map(n => n.trim()).filter(n => n !== ""); }

        function updatePreview() {
            if(mode !== 'individual') return;
            const names = getNames();
            track.innerHTML = names.length ? names.map(n => `<div class="slot">${n}</div>`).join('') : '<div class="slot">Aguardando...</div>';
        }

        function execute() {
            const names = getNames();
            if(names.length < 2) return alert("Mínimo 2 nomes.");

            if(mode === 'individual') {
                if(!pool.length) pool = [...names];
                const winnerName = pool[Math.floor(Math.random() * pool.length)];
                
                let longList = [];
                for(let i=0; i<10; i++) longList = [...longList, ...names];
                const finalPos = (longList.length - names.length) + names.indexOf(winnerName);
                
                track.innerHTML = longList.map(n => `<div class="slot">${n}</div>`).join('');
                track.style.transition = "none";
                track.style.transform = "translateX(0)";
                
                setTimeout(() => {
                    track.style.transition = "transform 1.5s cubic-bezier(0.1, 0, 0.1, 1)";
                    track.style.transform = `translateX(${-(finalPos * 250) - 125}px)`;
                }, 50);

                document.getElementById('mainBtn').disabled = true;
                setTimeout(() => {
                    document.querySelectorAll('.slot')[finalPos].classList.add('win');
                    pool = pool.filter(n => n !== winnerName);
                    document.getElementById('status-log').innerText = `Sorteado: ${winnerName} | Restam: ${pool.length}`;
                    document.getElementById('mainBtn').disabled = false;
                }, 1600);
            } else {
                const size = parseInt(document.getElementById('grpSize').value);
                const shuffled = [...names].sort(() => 0.5 - Math.random());
                grpResult.innerHTML = '<h2 style="color:var(--primary); font-size:1rem; margin-bottom:10px;">GRUPOS FORMADOS</h2>';
                for (let i = 0; i < shuffled.length; i += size) {
                    const g = shuffled.slice(i, i + size);
                    grpResult.innerHTML += `<div class="group-card"><strong>Grupo ${Math.floor(i/size)+1}</strong>${g.join(' & ')}</div>`;
                }
            }
        }
        window.onload = updatePreview;
    </script>
</body>
</html>
